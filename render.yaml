services:
  # Backend Service
  - type: web
    name: navora-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      - key: MODE
        value: simulation

  # Frontend Service (FIXED)
  - type: web
    name: navora-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist -l 10000
    plan: free
    region: oregon
    envVars:
      - key: VITE_API_URL
        value: https://navora-backend.onrender.com